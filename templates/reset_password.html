{% extends "base.html" %}
{% block title %}Reset Password - TechPath AI{% endblock %}

{% block content %}
<section class="py-5 bg-light" style="min-height: 80vh; display: flex; align-items: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow border-0" style="border-radius: 16px; overflow: hidden;">
          <div class="card-header bg-navy text-white text-center py-4">
            <h3 class="mb-0 fw-800"><i class="bi bi-key-fill me-2 text-gold"></i>New Password</h3>
          </div>
          <div class="card-body p-4 p-md-5">
            <p class="text-muted small mb-4 text-center">Set your new password to regain access.</p>

            {% if error %}
            <div class="alert alert-danger border-0 small shadow-sm mb-4" style="border-radius: 8px; background-color: #fff5f5; color: #e53e3e;" role="alert">
              {{ error }}
            </div>
            {% endif %}

            <form action="/reset-password" method="POST">
              <input type="hidden" name="email" value="{{ email }}">
              <input type="hidden" name="token" value="{{ token }}">
              
              <div class="mb-3">
                <label class="form-label text-navy small fw-700 text-uppercase ls-1">New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0 text-muted shadow-none"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" name="password" class="form-control border-start-0 ps-0 shadow-none" placeholder="••••••••" required style="border-radius: 0 8px 8px 0;">
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label text-navy small fw-700 text-uppercase ls-1">Confirm New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0 text-muted shadow-none"><i class="bi bi-lock"></i></span>
                  <input type="password" name="confirm_password" class="form-control border-start-0 ps-0 shadow-none" placeholder="••••••••" required style="border-radius: 0 8px 8px 0;">
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-700 shadow-sm transition" style="border-radius: 8px;">
                Reset Password <i class="bi bi-arrow-right-circle-fill ms-1"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
