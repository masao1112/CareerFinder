{% extends "base.html" %}
{% block title %}Forgot Password - TechPath AI{% endblock %}

{% block content %}
<section class="py-5 bg-light" style="min-height: 80vh; display: flex; align-items: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow border-0" style="border-radius: 16px; overflow: hidden;">
          <div class="card-header bg-navy text-white text-center py-4">
            <h3 class="mb-0 fw-800"><i class="bi bi-shield-lock-fill me-2 text-gold"></i>Password Recovery</h3>
          </div>
          <div class="card-body p-4 p-md-5">
            <p class="text-muted small mb-4">Enter your email and we'll send you an OTP code to reset your password.</p>

            {% if error %}
            <div class="alert alert-danger border-0 small shadow-sm mb-4" style="border-radius: 8px; background-color: #fff5f5; color: #e53e3e;" role="alert">
              {{ error }}
            </div>
            {% endif %}

            <form action="/forgot-password" method="POST">
              <div class="mb-4">
                <label class="form-label text-navy small fw-700 text-uppercase ls-1">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0 text-muted shadow-none"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="email" class="form-control border-start-0 ps-0 shadow-none" placeholder="name@example.com" required style="border-radius: 0 8px 8px 0;">
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-700 shadow-sm transition" style="border-radius: 8px;">
                Send OTP Code <i class="bi bi-send-fill ms-1"></i>
              </button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted small mb-0"><a href="/login" class="text-navy fw-700 text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to Log In</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
